<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <base href="/" />
  <title>Datamint — Extract PDF Data with AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Applied before any CSS paints, so the page never flashes the wrong theme
       while Angular (and ThemeService) bootstraps. Kept in sync with the
       'system'/'light'/'dark' choice ThemeService persists to localStorage. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('dm-theme');
        var theme = (saved === 'light' || saved === 'dark')
          ? saved
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234F46E5'/%3E%3Ctext x='16' y='22' font-family='Arial,sans-serif' font-size='17' font-weight='700' fill='white' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Google Identity Services: powers the "Continue with Google" button -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Razorpay Checkout widget: powers the subscription payment flow -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
